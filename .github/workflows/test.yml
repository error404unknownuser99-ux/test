name: Aider GUI 3.1 Flash Lite - Fixed Final

on:
  workflow_dispatch:

jobs:
  run-aider:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Aider & Browser Bundle
        run: |
          pip install aider-chat
          # GUI ke liye browser features manually install kar rahe hain
          pip install 'aider-chat[browser]'
          
          # Bore Tunnel Setup
          wget https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          tar -xf bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          chmod +x bore

      - name: Launch Aider GUI Server
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Streamlit ko headless mode me chalane ke liye
          STREAMLIT_SERVER_HEADLESS: "true"
          STREAMLIT_SERVER_PORT: 8501
        run: |
          echo "🚀 Aider GUI start ho raha hai..."
          
          # Fix: Humne '--browser false' hata diya hai taaki wo file na banaye
          # '--no-browser' use kar rahe hain jo standard hai
          nohup aider --gui --model gemini/gemini-3.1-flash-lite --no-browser > aider.log 2>&1 &
          
          echo "⏳ 50 seconds wait kar rahe hain Streamlit ke liye..."
          sleep 50
          
          echo "📝 --- LATEST AIDER LOGS ---"
          cat aider.log
          
          echo "🔍 Port Check..."
          if curl -s http://localhost:8501 > /dev/null; then
            echo "✅ SUCCESS: GUI is UP!"
          else
            echo "❌ ERROR: Port 8501 respond nahi kar raha."
            exit 1
          fi

          echo "🌐 Starting Bore Tunnel..."
          ./bore local 8501 --to bore.pub > bore.log 2>&1 &
          
          sleep 10
          BORE_URL=$(grep -o 'bore.pub:[0-9]*' bore.log | head -n 1)
          
          echo "=========================================================="
          echo "🔗 APKA URL: http://$BORE_URL"
          echo "=========================================================="
          
          tail -f aider.log -f bore.log
