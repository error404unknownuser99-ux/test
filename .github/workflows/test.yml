name: Aider GUI 3.1 Flash Lite - Final Success

on:
  workflow_dispatch:

jobs:
  run-aider:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Tools
        run: |
          pip install aider-chat
          wget https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          tar -xf bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          chmod +x bore

      - name: Launch Aider GUI & Bore Tunnel
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          STREAMLIT_SERVER_PORT: 8501
        run: |
          echo "🚀 Launching Aider with gemini-3.1-flash-lite..."
          
          # Aider ko background mein start kar rahe hain
          nohup aider --gui --model gemini/gemini-3.1-flash-lite --no-browser > aider.log 2>&1 &
          
          echo "⏳ Waiting 60 seconds for Streamlit/Aider to fully initialize..."
          sleep 60
          
          echo "🌐 Starting Bore Tunnel..."
          # Bore ko background mein start karke logs capture karenge
          ./bore local 8501 --to bore.pub > bore.log 2>&1 &
          
          sleep 10
          
          # URL extract karke print karna
          BORE_URL=$(grep -o 'bore.pub:[0-9]*' bore.log | head -n 1)
          
          echo "=========================================================="
          echo "🎉 SAB KUCH SET HAI!"
          if [ -z "$BORE_URL" ]; then
            echo "❌ BORE URL nahi mila, logs check karein niche."
            cat bore.log
          else
            echo "🔗 APKA URL HAI: http://$BORE_URL"
          fi
          echo "=========================================================="
          
          # Logs ko continuous dikhane ke liye taaki action chalta rahe
          tail -f aider.log
