name: Aider Streamlit Status Check

on:
  workflow_dispatch:

jobs:
  run-aider:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Aider
        run: |
          pip install aider-chat
          wget https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          tar -xf bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          chmod +x bore

      - name: Launch Aider & Show Internal URL
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "🚀 Aider ko start kar rahe hain..."
          
          # Aider ko launch kar rahe hain. --no-browser zaroori hai.
          nohup aider --gui --model gemini/gemini-3.1-flash-lite --no-browser > aider.log 2>&1 &
          
          echo "⏳ 40 seconds wait kar rahe hain taaki Streamlit load ho jaye..."
          sleep 40
          
          echo "📝 --- AIDER LOGS (Starting se) ---"
          cat aider.log
          echo "📝 ---------------------------------"
          
          echo "🔍 Checking Internal Connectivity..."
          # Ye command check karegi ki kya port 8501 par kuch mil raha hai
          if curl -s http://localhost:8501 > /dev/null; then
            echo "✅ SUCCESS: Aider Streamlit port 8501 par response de raha hai!"
          else
            echo "❌ ERROR: Aider port 8501 par connect nahi ho pa raha. Logs check karein."
            exit 1
          fi

          echo "🌐 Starting Bore Tunnel ab..."
          ./bore local 8501 --to bore.pub > bore.log 2>&1 &
          
          sleep 10
          BORE_URL=$(grep -o 'bore.pub:[0-9]*' bore.log | head -n 1)
          
          echo "=========================================================="
          echo "🔗 APKA PUBLIC URL: http://$BORE_URL"
          echo "=========================================================="
          
          tail -f aider.log -f bore.log
