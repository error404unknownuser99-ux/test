name: Deploy OpenCode Web on bore.pub
on: 
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    # फिक्स: npm की जगह ऑफिसियल curl स्क्रिप्ट का इस्तेमाल
    - name: Install OpenCode
      run: curl -fsSL https://opencode.ai/install | bash
    
    - name: Setup Google AI Studio API Key
      env:
        GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
      run: |
        mkdir -p ~/.opencode
        echo '{"provider": "google", "apiKey": "'$GOOGLE_AI_API_KEY'", "model": "gemini-3.1-flash-lite"}' > ~/.opencode/config.json
    
    - name: Start OpenCode Web Server
      run: |
        nohup opencode web --hostname 0.0.0.0 --port 3000 > opencode.log 2>&1 &
        sleep 10
    
    - name: Health Check
      run: curl -f http://localhost:3000/health || exit 1
    
    # फिक्स: bore का पोर्ट सही तरीके से निकालना
    - name: Start bore.pub tunnel
      id: bore
      run: |
        curl -sSfL https://github.com/ekzhang/bore/releases/download/v0.6.0/bore-v0.6.0-x86_64-unknown-linux-musl.tar.gz | tar -xz -C /tmp
        sudo mv /tmp/bore /usr/local/bin/
        
        # bore को रन करना और लॉग सेव करना
        nohup bore local 3000 --to bore.pub > bore.log 2>&1 &
        sleep 5
        
        # लॉग फाइल से सही पोर्ट एक्सट्रेक्ट करना
        BORE_PORT=$(grep -oP 'listening at bore.pub:\K\d+' bore.log || echo "PORT_NOT_FOUND")
        echo "url=http://bore.pub:$BORE_PORT" >> $GITHUB_OUTPUT
        echo "Bore Tunnel URL: http://bore.pub:$BORE_PORT"
    
    - name: Deploy Success Notification
      if: success()
      uses: actions/github-script@v7
      with:
        script: |
          core.setOutput('url', '${{ steps.bore.outputs.url }}');
          console.log('🚀 OpenCode Web Live at: ${{ steps.bore.outputs.url }}');
          
    # फिक्स: GitHub Action को तुरंत बंद होने से रोकना ताकि तुम सर्वर एक्सेस कर सको
    - name: Keep Runner Alive (Temporary)
      run: |
        echo "✅ सर्वर चालू है! इसे एक्सेस करने के लिए ऊपर 'Start bore.pub tunnel' स्टेप में दिया गया लिंक ओपन करें।"
        echo "⚠️ ध्यान दें: यह सेशन 1 घंटे बाद अपने आप बंद हो जाएगा।"
        sleep 3600
