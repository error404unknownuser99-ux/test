name: Aider GUI 3-Hour Secure Session

on:
  workflow_dispatch: # Isse aap manually 'Actions' tab se start kar sakte hain

jobs:
  run-aider:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Aider ko git history chahiye hoti hai taaki wo sahi se code edit kar sake

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Aider and Bore
        run: |
          pip install aider-chat
          # Bore CLI download (Tunneling ke liye)
          wget https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          tar -xf bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          chmod +x bore

      - name: Launch Aider GUI & Bore Tunnel
        env:
          # Google AI Studio key ko Secrets se utha raha hai
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "Starting Aider with Gemini 1.5 Pro..."
          
          # Aider ko background mein launch kar rahe hain
          # --no-browser: Taaki runner ke andar browser na khule
          # --gui: Browser interface enable karne ke liye
          # --port 8501: Default streamlit port
          nohup aider --gui --port 8501 --model gemini/gemini-3.1-flash-lite --no-browser > aider.log 2>&1 &
          
          sleep 10 # Aider load hone ka wait
          
          echo "----------------------------------------------------------"
          echo "  AIDER IS RUNNING! CHECK THE BORE URL BELOW             "
          echo "----------------------------------------------------------"
          
          # 180 minutes = 3 hours ka session
          # Bore automatically ek public URL generate karega
          timeout 180m ./bore local 8501 --to bore.pub
