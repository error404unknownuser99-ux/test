name: Aider GUI Server Start Fix

on:
  workflow_dispatch:

jobs:
  run-aider:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Aider
        run: |
          pip install aider-chat
          wget https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          tar -xf bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          chmod +x bore

      - name: Launch Aider GUI Server
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "🚀 Aider GUI Server ko background mein start kar rahe hain..."
          
          # MODIFIED COMMAND:
          # --gui: GUI mode enable karta hai
          # --browser false: Runner ke andar browser kholne se rokta hai (Ye zaroori hai!)
          nohup aider --gui --model gemini/gemini-3.1-flash-lite --browser false > aider.log 2>&1 &
          
          echo "⏳ 50 seconds wait kar rahe hain Streamlit server ke liye..."
          sleep 50
          
          echo "📝 --- LATEST AIDER LOGS ---"
          cat aider.log
          
          echo "🔍 Port 8501 Status Check..."
          if curl -s http://localhost:8501 > /dev/null; then
            echo "✅ SUCCESS: Streamlit GUI is UP and Running!"
          else
            echo "❌ ERROR: Aider CLI mode mein hi ruk gaya, GUI start nahi hua."
            # Debugging ke liye check karein ki process kya kar raha hai
            ps aux | grep aider
            exit 1
          fi

          echo "🌐 Starting Bore Tunnel..."
          ./bore local 8501 --to bore.pub > bore.log 2>&1 &
          
          sleep 10
          BORE_URL=$(grep -o 'bore.pub:[0-9]*' bore.log | head -n 1)
          
          echo "=========================================================="
          echo "🔗 APKA URL: http://$BORE_URL"
          echo "=========================================================="
          
          tail -f aider.log -f bore.log
