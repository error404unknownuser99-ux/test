name: Aider GUI 3.1 Flash Lite - Fixed

on:
  workflow_dispatch:

jobs:
  run-aider:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Tools
        run: |
          pip install aider-chat
          wget https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          tar -xf bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          chmod +x bore

      - name: Launch Aider GUI & Auto-Check
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Port set karne ka sahi tarika Streamlit ke through
          STREAMLIT_SERVER_PORT: 8501
        run: |
          echo "🚀 Starting Aider with gemini-3.1-flash-lite..."
          
          # Yahan se --port hata diya hai kyunki wo error de raha tha
          nohup aider --gui --model gemini/gemini-3.1-flash-lite --no-browser > aider.log 2>&1 &
          
          echo "⏳ Waiting for Aider GUI to respond on port 8501..."
          
          MAX_RETRIES=20
          COUNT=0
          while ! nc -z localhost 8501; do
            sleep 2
            COUNT=$((COUNT+1))
            echo "Retry $COUNT/$MAX_RETRIES: GUI abhi tak start nahi hua..."
            if [ $COUNT -eq $MAX_RETRIES ]; then
              echo "❌ ERROR: Aider GUI fail ho gaya. Logs niche dekhein:"
              cat aider.log
              exit 1
            fi
          done

          echo "✅ Aider GUI is UP!"
          
          ./bore local 8501 --to bore.pub > bore.log 2>&1 &
          
          sleep 5
          BORE_URL=$(grep -o 'bore.pub:[0-9]*' bore.log | head -n 1)
          
          echo "=========================================================="
          echo "🎉 SETUP SUCCESSFUL!"
          echo "🔗 APKA URL HAI: http://$BORE_URL"
          echo "=========================================================="
          
          timeout 180m tail -f aider.log
