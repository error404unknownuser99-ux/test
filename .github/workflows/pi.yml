name: Calculate Pi 🥧

on:
  workflow_dispatch:

jobs:
  calculate-pi:
    runs-on: ubuntu-latest
    steps:
      - name: Calculate Pi to 23 decimal places
        run: |
          python3 -c "
          from decimal import Decimal, getcontext
          getcontext().prec = 30

          def arctan(x, terms=200):
              result = Decimal(0)
              power = Decimal(x)
              for i in range(terms):
                  result += ((-1)**i * power) / (2*i + 1)
                  power *= Decimal(x) * Decimal(x)
              return result

          pi = 4 * (4 * arctan(Decimal(1)/5) - arctan(Decimal(1)/239))
          pi_str = str(pi)

          print('=' * 40)
          print('🥧  Pi Calculator — 23 Decimal Places')
          print('=' * 40)
          print(f'π = {pi_str[:25]}')
          print(f'✅ Digits: 3.{pi_str[2:25]}')
          print('=' * 40)
          print('Known value:')
          print('π = 3.14159265358979323846264')
          "
